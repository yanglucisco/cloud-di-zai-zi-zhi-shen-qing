server:
  port: 20001
  servlet:
    session:
      tracking-modes: cookie
spring:
  cloud:
    # 配置Nacos服务发现
    nacos:
      discovery:
        server-addr: ${NACOS_HOST}:8848 # 你的Nacos服务器地址
  # security:
    # oauth2:
    #   authorizationserver:
    #     issuer: http://${AUTH_CENTER_HOST}:20001
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/${DB_NAME:auth_center}?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:auth_center}
    password: ${DB_PASSWORD:pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${AUTH_CENTER_REDIS_HOST}  # 你的Redis服务器地址
      port: ${AUTH_CENTER_REDIS_PORT}       # 你的Redis服务器端口
      # 如果Redis有密码，需要配置
      # password: your-redis-password
      # 可以选择数据库编号，默认为0
      # database: 0
      lettuce:
        pool:
          max-active: 8   # 连接池最大连接数
          max-idle: 8     # 连接池最大空闲连接数
          min-idle: 0     # 连接池最小空闲连接数
  session:
    store-type: redis
    timeout: 60m 
    redis:
      namespace: auth-center:session
mybatis-plus:
  configuration:
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: DELETE_FLAG
      logic-delete-value: DELETED
      logic-not-delete-value: NOT_DELETE
    enable-sql-runner: true
  mapper-locations: classpath*:/mapper/**/*.xml
logging:
  pattern:
    # 包含MDC信息 - 使用%X{key}格式
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [user:%X{userId}] [trace:%X{requestId}] - %msg%n"
    # file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [user:%X{userId}] [trace:%X{requestId}] - %msg%n"