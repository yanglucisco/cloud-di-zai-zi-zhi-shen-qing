apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- deployment.yaml
- nfs-pvc.yaml
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      #app: nginx
      managed-by: kustomize
commonAnnotations:
  description: "Application managed by Kustomize"
  version: "base"

