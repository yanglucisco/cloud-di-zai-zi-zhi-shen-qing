apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloud-di-zai-dev
# 引用基础配置
resources:
  - ../../../base/dev
  - ../../../services/auth-center
  - configmap.yaml
  - secret.yaml
# 覆盖镜像名称和标签
images:
- name: docker.io/library/cloud-di-zai-auth-center
  newName: docker.io/library/cloud-di-zai-auth-center
  newTag: "1.0"
patches:
  - path: deployment-patch.yaml
